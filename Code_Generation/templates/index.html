<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGen - AI-Powered Code Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">CodeGen</h1>
            <p class="subtitle">AI-Powered Code Generator</p>
        </header>

        <!-- Main Form -->
        <div class="card">
            <form id="prompt-form">
                <div class="form-group">
                    <label for="prompt" class="form-label">Enter your prompt:</label>
                    <textarea id="prompt" class="form-input" rows="5" placeholder="e.g., Write a Python function to calculate the factorial of a number."></textarea>
                </div>
                <button type="submit" id="generate-button" class="submit-button">
                    <span id="button-text">Generate Code</span>
                    <span id="spinner" class="spinner"></span>
                </button>
            </form>
            <p class="error-message" id="error-message"></p>
        </div>
        <div class="form-group">
            <label for="model" class="form-label">Select Model:</label>
            <select id="model" class="form-input">
                <option value="codeT5" selected>CodeT5</option>
                <option value="BART">BART</option>
            </select>
        </div>
        
        <!-- Generated Code Section -->
        <div class="card">
            <h2 class="section-title">Generated Code</h2>
            <pre id="generated-code" class="code-output"></pre>
            <button id="copy-button" class="btn btn-sm btn-outline-light position-absolute top-0 end-0 m-2 d-none">
                <i class="fas fa-copy">Copy</i>
            </button>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
